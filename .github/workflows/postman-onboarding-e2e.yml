name: Postman Onboarding E2E

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: Project name used in Postman workspace and generated assets
        required: true
        default: dummy-orders-api
      domain:
        description: Optional business domain for governance assignment
        required: false
      domain_code:
        description: Optional short code used in workspace naming
        required: false
      workspace_team_id:
        description: Optional Postman workspace sub-team ID for org-mode workspace creation
        required: false
      spec_url:
        description: Optional HTTPS URL override for the OpenAPI source
        required: false
      environments_json:
        description: JSON array of Postman environments to create
        required: true
        default: '["prod","stage"]'
      env_runtime_urls_json:
        description: JSON map of runtime URLs keyed by environment slug
        required: true
        default: '{"prod":"https://dummy-orders-api.example.com","stage":"https://stage.dummy-orders-api.example.com"}'
      repo_write_mode:
        description: Repo mutation mode for repo-sync
        required: true
        default: commit-and-push
      monitor_cron:
        description: Optional cron for the smoke monitor. Leave blank to create it disabled.
        required: false
        default: ""

permissions:
  actions: write
  contents: write

jobs:
  onboarding:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required configuration
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
        run: |
          test -n "$POSTMAN_API_KEY" || { echo "Missing required secret: POSTMAN_API_KEY"; exit 1; }
          test -n "$POSTMAN_ACCESS_TOKEN" || { echo "Missing required secret: POSTMAN_ACCESS_TOKEN"; exit 1; }

      - name: Resolve immutable spec URL
        id: spec
        env:
          SPEC_URL_OVERRIDE: ${{ inputs.spec_url }}
        run: |
          if [ -n "$SPEC_URL_OVERRIDE" ]; then
            echo "url=$SPEC_URL_OVERRIDE" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/specs/dummy-orders-api.openapi.yaml" >> "$GITHUB_OUTPUT"
          fi

      - name: Bootstrap Postman assets
        id: bootstrap
        uses: postman-cs/postman-bootstrap-action@main
        with:
          project-name: ${{ inputs.project_name }}
          domain: ${{ inputs.domain }}
          domain-code: ${{ inputs.domain_code }}
          workspace-team-id: ${{ inputs.workspace_team_id }}
          spec-url: ${{ steps.spec.outputs.url }}
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
      
      - name: Sync repository and workspace
        id: repo_sync
        uses: postman-cs/postman-repo-sync-action@feat/monitor-run-once-when-no-cron
        env:
          POSTMAN_TEAM_ID: ${{ vars.POSTMAN_TEAM_ID }}
        with:
          project-name: ${{ inputs.project_name }}
          workspace-id: ${{ steps.bootstrap.outputs.workspace-id }}
          baseline-collection-id: ${{ steps.bootstrap.outputs.baseline-collection-id }}
          smoke-collection-id: ${{ steps.bootstrap.outputs.smoke-collection-id }}
          contract-collection-id: ${{ steps.bootstrap.outputs.contract-collection-id }}
          spec-id: ${{ steps.bootstrap.outputs.spec-id }}
          spec-path: specs/dummy-orders-api.openapi.yaml
          environments-json: ${{ inputs.environments_json }}
          env-runtime-urls-json: ${{ inputs.env_runtime_urls_json }}
          repo-write-mode: ${{ inputs.repo_write_mode }}
          current-ref: ${{ github.ref_name }}
          generate-ci-workflow: false
          ci-workflow-path: .github/workflows/postman-collection-ci.yml
          monitor-cron: ${{ inputs.monitor_cron }}
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ github.token }}
          gh-fallback-token: ${{ secrets.GH_FALLBACK_TOKEN }}

      - name: Summarize outputs
        run: |
          {
            echo "## Postman onboarding branch test"
            echo ""
            echo "- Bootstrap action ref: \`postman-cs/postman-bootstrap-action@main\`"
            echo "- Repo sync action ref: \`postman-cs/postman-repo-sync-action@feat/monitor-run-once-when-no-cron\`"
            echo "- Workspace ID: \`${{ steps.bootstrap.outputs.workspace-id }}\`"
            echo "- Workspace URL: ${{ steps.bootstrap.outputs.workspace-url }}"
            echo "- Spec ID: \`${{ steps.bootstrap.outputs.spec-id }}\`"
            echo "- Mock URL: ${{ steps.repo_sync.outputs.mock-url }}"
            echo "- Monitor ID: \`${{ steps.repo_sync.outputs.monitor-id }}\`"
            echo "- Commit SHA: \`${{ steps.repo_sync.outputs.commit-sha }}\`"
            echo "- Bootstrap outcome: \`${{ steps.bootstrap.outcome }}\`"
            echo "- Repo sync outcome: \`${{ steps.repo_sync.outcome }}\`"
            echo "- Repo sync summary: \`${{ steps.repo_sync.outputs.repo-sync-summary-json }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
