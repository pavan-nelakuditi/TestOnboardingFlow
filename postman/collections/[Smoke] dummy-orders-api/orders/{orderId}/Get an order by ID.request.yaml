type: http
name: Get an order by ID
url: '{{baseUrl}}/orders/:orderId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: string
    description: Order identifier
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "string",
            "customerId": "string",
            "status": "shipped",
            "total": 6891.988182823181,
            "currency": "str",
            "createdAt": "1955-03-15T08:44:28.372Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Order found
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Order not found
