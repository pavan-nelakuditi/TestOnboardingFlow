type: http
name: Create an order
url: '{{baseUrl}}/orders'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "customerId": "cus_2001",
      "items": [
        {
          "sku": "sku_abc",
          "quantity": 2
        },
        {
          "sku": "sku_xyz",
          "quantity": 1
        }
      ]
    }
