openapi: 3.0.3
info:
  title: Dummy Orders API
  version: 1.0.0
  description: >
    A small dummy API used to exercise the Postman API onboarding flow from
    bootstrap through repo sync.
servers:
  - url: https://dummy-orders-api.example.com
    description: Production
  - url: https://stage.dummy-orders-api.example.com
    description: Stage
tags:
  - name: Health
  - name: Orders
paths:
  /health:
    get:
      tags:
        - Health
      summary: Check service health
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    status: ok
                    timestamp: "2026-04-20T15:00:00Z"
  /orders:
    get:
      tags:
        - Orders
      summary: List orders
      operationId: listOrders
      parameters:
        - in: query
          name: status
          description: Filter orders by lifecycle status
          required: false
          schema:
            $ref: "#/components/schemas/OrderStatus"
      responses:
        "200":
          description: Orders returned successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
              examples:
                sample:
                  value:
                    data:
                      - id: ord_1001
                        customerId: cus_2001
                        status: pending
                        total: 29.99
                        currency: USD
                        createdAt: "2026-04-20T14:00:00Z"
    post:
      tags:
        - Orders
      summary: Create an order
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
            examples:
              sample:
                value:
                  customerId: cus_2001
                  items:
                    - sku: sku_abc
                      quantity: 2
                    - sku: sku_xyz
                      quantity: 1
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
              examples:
                created:
                  value:
                    id: ord_1002
                    customerId: cus_2001
                    status: pending
                    total: 49.97
                    currency: USD
                    createdAt: "2026-04-20T14:05:00Z"
        "400":
          description: Invalid order payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /orders/{orderId}:
    get:
      tags:
        - Orders
      summary: Get an order by ID
      operationId: getOrderById
      parameters:
        - in: path
          name: orderId
          required: true
          description: Order identifier
          schema:
            type: string
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
    OrderStatus:
      type: string
      enum:
        - pending
        - confirmed
        - shipped
        - cancelled
    Order:
      type: object
      required:
        - id
        - customerId
        - status
        - total
        - currency
        - createdAt
      properties:
        id:
          type: string
        customerId:
          type: string
        status:
          $ref: "#/components/schemas/OrderStatus"
        total:
          type: number
          format: float
        currency:
          type: string
          minLength: 3
          maxLength: 3
        createdAt:
          type: string
          format: date-time
    CreateOrderRequest:
      type: object
      required:
        - customerId
        - items
      properties:
        customerId:
          type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderItemInput"
    OrderItemInput:
      type: object
      required:
        - sku
        - quantity
      properties:
        sku:
          type: string
        quantity:
          type: integer
          minimum: 1
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
